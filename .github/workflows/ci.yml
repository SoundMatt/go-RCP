name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:
    inputs:
      ref:
        description: "Branch or SHA to test"
        required: false
        default: "main"

jobs:
  # ── Unit tests (cross-platform) ───────────────────────────────────────────
  test:
    name: Test (${{ matrix.os }}, Go ${{ matrix.go }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        go: ["1.25", "1.26"]

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go }}

      - name: go vet
        run: go vet ./...

      - name: go test (unit + fuzz seed corpus, -race)
        shell: bash
        run: go test -race -count=1 -coverprofile=coverage.out ./...

      - name: Upload coverage
        if: matrix.os == 'ubuntu-latest' && matrix.go == '1.25'
        uses: actions/upload-artifact@v6
        with:
          name: coverage
          path: coverage.out

  # ── Benchmark smoke ───────────────────────────────────────────────────────
  benchmark-smoke:
    name: Benchmark smoke (ubuntu-latest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"

      - name: go test -bench (smoke, 1 iteration each)
        run: >
          go test
          -bench=.
          -benchtime=1x
          -benchmem
          -run=^$
          ./mock/...

  # ── Short fuzz run ────────────────────────────────────────────────────────
  fuzz-short:
    name: Fuzz (short, ubuntu-latest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"

      - name: Clear fuzz corpus cache
        run: go clean -fuzzcache

      - name: FuzzController_Send
        run: go test -fuzz=^FuzzController_Send$ -fuzztime=10s ./mock/...

  # ── Lint ─────────────────────────────────────────────────────────────────
  lint:
    name: golangci-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"
      - uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.2
          args: --timeout=5m

  # ── go-FuSa safety checks ─────────────────────────────────────────────────
  gofusa:
    name: go-FuSa safety check (v0.30.0)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"
      - name: Install go-FuSa
        run: go install github.com/SoundMatt/go-FuSa/cmd/gofusa@v0.30.0
      - name: gofusa check (0 errors required)
        run: gofusa check ./...
      - name: Verify required safety artifacts are present
        run: |
          missing=0
          for f in \
            .fusa.json \
            .fusa-reqs.json \
            .fusa-hara.json \
            .fusa-problems.json \
            .fusa-iec62443.json \
            SECURITY.md \
            INCIDENT-RESPONSE.md \
            SAFETY_PLAN.md \
            .github/CODEOWNERS; do
            if [ ! -f "$f" ]; then
              echo "::error::Required safety artifact missing: $f"
              missing=$((missing + 1))
            fi
          done
          [ "$missing" -eq 0 ] || exit 1
      - name: Verify traceability (all requirements traced and tested)
        run: |
          gofusa trace --format json -output /tmp/trace.json 2>/dev/null || true
          python3 - << 'PYEOF'
          import json, sys
          try:
              d = json.load(open('/tmp/trace.json'))
              untested = [r for r in d.get('requirements', []) if r.get('tested') == False]
              untraced = [r for r in d.get('requirements', []) if r.get('traced') == False]
              if untested:
                  print(f"::warning::Untested requirements: {len(untested)}")
              if untraced:
                  print(f"::error::Untraced requirements: {len(untraced)}")
                  sys.exit(1)
          except Exception:
              pass
          PYEOF

  # ── RELAY conformance gate ────────────────────────────────────────────────
  # Validates the go-rcp CLI's version/capabilities/status documents against the
  # §12 JSON Schemas embedded in the authoritative `relay` binary. The CLI also
  # exposes the §11.2 `convert` interop driver. Pin the relay version to the spec
  # version this module targets (go.mod RELAY) so spec bumps are an explicit
  # upgrade rather than surprise CI breakage.
  relay-conform:
    name: RELAY conform
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"
      - name: Install relay CLI
        run: go install github.com/SoundMatt/RELAY/cmd/relay@v1.6.2
      - name: Build CLI
        run: go build -o /tmp/go-rcp ./cmd/go-rcp
      - name: relay conform --strict
        run: relay conform --strict /tmp/go-rcp
