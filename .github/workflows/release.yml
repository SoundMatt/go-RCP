name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  regenerate-safety-artifacts:
    name: Regenerate safety artifacts
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: main

      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"

      - name: Install go-FuSa
        run: go install github.com/SoundMatt/go-FuSa/cmd/gofusa@v0.30.0

      - name: Generate coverage profile
        run: go test -coverprofile=coverage.out ./...

      - name: Regenerate dFMEA table
        run: gofusa fmea -cyber

      - name: Regenerate safety case
        run: gofusa safety-case

      - name: Regenerate SBOM, provenance, and artifact manifest
        run: gofusa release

      - name: Regenerate compliance gap reports
        run: |
          gofusa iec61508 -output iec61508-gap-report.json -format json
          gofusa iso26262 -output iso26262-gap-report.json -format json
          gofusa iec62443 -output iec62443-gap-report.json -format json -sl SL-2
          gofusa iso21434 -output iso21434-gap-report.json -format json -cal CAL-3

      - name: Generate TARA
        run: gofusa tara

      - name: Generate structural coverage report
        run: gofusa coverage -dal DAL-B -output coverage-report.json -format json coverage.out

      - name: Bundle audit pack
        run: gofusa audit-pack

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Commit regenerated artifacts
        run: |
          TAG="${{ github.ref_name }}"
          git add fmea.csv fmea.json \
                  safety-case.json safety-case.md safety-case.mermaid \
                  sbom.json provenance.json artifact-manifest.json \
                  iec61508-gap-report.json iso26262-gap-report.json iec62443-gap-report.json \
                  iso21434-gap-report.json \
                  tara.json tara.md \
                  coverage-report.json \
                  audit-pack.zip
          if git diff --cached --quiet; then
            echo "No artifact changes for $TAG — nothing to commit."
          else
            git commit -m "chore: regenerate safety artifacts for $TAG [skip ci]

Signed-off-by: github-actions[bot] <github-actions[bot]@users.noreply.github.com>"
            git push origin HEAD:refs/heads/main
          fi
