name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  regenerate-safety-artifacts:
    name: Regenerate safety artifacts
    runs-on: ubuntu-latest

    steps:
      # Check out the tagged commit so the regenerated evidence matches the release.
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"

      - name: Install go-FuSa
        run: go install github.com/SoundMatt/go-FuSa/cmd/gofusa@v0.30.0

      - name: Generate coverage profile
        run: go test -coverprofile=coverage.out ./...

      - name: Regenerate dFMEA table
        run: gofusa fmea -cyber

      - name: Regenerate safety case
        run: gofusa safety-case

      - name: Regenerate SBOM, provenance, and artifact manifest
        run: gofusa release

      - name: Regenerate compliance gap reports
        # These commands always write their JSON report, but exit non-zero when
        # the report contains gaps (an expected, evolving condition). The report
        # is an audit-pack artifact, not a gate — the gate is the separate
        # "go-FuSa safety check" job (gofusa check). Tolerate the gaps-found
        # exit so report generation does not fail the release; a missing output
        # file is caught by the git-add step that follows.
        run: |
          gofusa iec61508 -output iec61508-gap-report.json -format json || true
          gofusa iso26262 -output iso26262-gap-report.json -format json || true
          gofusa iec62443 -output iec62443-gap-report.json -format json -sl SL-2 || true
          gofusa iso21434 -output iso21434-gap-report.json -format json -cal CAL-3 || true

      - name: Generate TARA
        run: gofusa tara

      - name: Generate structural coverage report
        run: gofusa coverage -dal DAL-B -output coverage-report.json -format json coverage.out

      - name: Bundle audit pack
        run: gofusa audit-pack

      - name: Publish safety artifacts to the GitHub Release
        # The artifacts are generated build outputs (ignored by .gitignore), so
        # they are attached to the release rather than committed to the repo.
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ github.ref_name }}"
          CANDIDATES=(
            fmea.csv fmea.json
            safety-case.json safety-case.md safety-case.mermaid
            sbom.json provenance.json artifact-manifest.json
            iec61508-gap-report.json iso26262-gap-report.json iec62443-gap-report.json
            iso21434-gap-report.json
            tara.json tara.md
            coverage-report.json
            audit-pack.zip
          )
          FILES=()
          for f in "${CANDIDATES[@]}"; do
            if [ -f "$f" ]; then
              FILES+=("$f")
            else
              echo "::warning::expected artifact $f was not generated"
            fi
          done
          if [ ${#FILES[@]} -eq 0 ]; then
            echo "No safety artifacts were generated for $TAG" >&2
            exit 1
          fi
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" "${FILES[@]}" --clobber
          else
            gh release create "$TAG" "${FILES[@]}" \
              --title "$TAG" \
              --notes "Safety evidence artifacts regenerated for $TAG (dFMEA, safety case, SBOM, provenance, compliance gap reports, TARA, structural coverage, audit pack)."
          fi
